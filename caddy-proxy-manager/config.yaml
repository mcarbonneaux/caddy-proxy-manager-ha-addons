name: Caddy Proxy Manager
version: "1.4-ha.48"
slug: caddy_proxy_manager
description: >
  Caddy reverse proxy managed by caddy-proxy-manager web UI.
  IMPORTANT: admin_password must be at least 12 characters and include uppercase, lowercase, and a number (e.g. Admin123456!).
  session_secret is auto-generated if left empty.
  http_port and https_port define the ports Caddy will use on your network.
url: https://github.com/mcarbonneaux/caddy-proxy-manager-ha-addons
arch:
  - amd64
  - aarch64

ports:
  80/tcp: 80
  443/tcp: 443
  3000/tcp: 3000

ports_description:
  80/tcp: HTTP
  443/tcp: HTTPS
  3000/tcp: CPM Web UI

ingress: true
ingress_port: 3000
ingress_entry: /login
panel_icon: mdi:shield-check
panel_title: Caddy Proxy Manager
options:
  session_secret: ""
  admin_username: admin
  admin_password: ""

schema:
  session_secret: str
  admin_username: str
  admin_password: str

map:
  - data:rw

image: ghcr.io/mcarbonneaux/caddy-proxy-manager-ha/{arch}
