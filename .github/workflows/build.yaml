name: Build & Push

on:
  push:
    tags:
      - "v*"
      - "[0-9]*"
  workflow_dispatch:

env:
  UPSTREAM_VERSION: "latest"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/caddy-proxy-manager-ha

jobs:
  version:
    name: Prepare Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract tag version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="latest"
          else
            VERSION=${GITHUB_REF_NAME#v}
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Update files
        if: github.event_name != 'workflow_dispatch'
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          # Update config.yaml
          sed -i "s/^version:.*/version: \"${VERSION}\"/" caddy-proxy-manager/config.yaml
          
          # Update build.yaml
          REGISTRY=${{ env.REGISTRY }}
          IMAGE=${{ env.IMAGE_NAME }}
          for arch in amd64 aarch64; do
            sed -i "s|${arch}: .*|${arch}: ${REGISTRY}/${IMAGE}/${arch}:${VERSION}|" caddy-proxy-manager/build.yaml
          done

      - name: Commit and push updated files
        if: github.event_name != 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add caddy-proxy-manager/config.yaml caddy-proxy-manager/build.yaml
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.VERSION }}"
          git push origin HEAD:master

  build:
    name: Build ${{ matrix.arch }}
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: caddy-proxy-manager
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            UPSTREAM_VERSION=${{ env.UPSTREAM_VERSION }}
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=${{ needs.version.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.arch }}:${{ needs.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.arch }}:latest

